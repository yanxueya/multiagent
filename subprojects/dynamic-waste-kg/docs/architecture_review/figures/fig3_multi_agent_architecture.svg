<text x="1200" y="372" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">1  Supervisor Agent</text>
<text x="872" y="408" font-family="Microsoft YaHei, sans-serif" font-size="22" fill="#172033">三模式条件路由：探索 / 监督执行 / 人机协作</text>
<rect x="130" y="615" width="440" height="180" rx="18" fill="#DCEEFF" stroke="#173F6D" stroke-width="3" filter="url(#shadow)"/>
<text x="350" y="657" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">2  Perception Agent</text>
<text x="152" y="693" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">组织 YOLO / VLM / D435i</text>
<text x="152" y="724" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">产出 Observation 引用</text>
<rect x="690" y="615" width="440" height="180" rx="18" fill="#DCEEFF" stroke="#173F6D" stroke-width="3" filter="url(#shadow)"/>
<text x="910" y="657" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">3  Action Planning Agent</text>
<text x="712" y="693" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">硬过滤 + 无权重字典序</text>
<text x="712" y="724" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">每次只生成一个动作</text>
<rect x="1260" y="615" width="410" height="180" rx="18" fill="#FFF0D6" stroke="#B86616" stroke-width="3" filter="url(#shadow)"/>
<text x="1465" y="657" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#B86616">Human Review Interrupt</text>
<text x="1282" y="693" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">确定性暂停与恢复</text>
<text x="1282" y="724" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">仅允许5种审核动作</text>
<rect x="1800" y="615" width="450" height="180" rx="18" fill="#DCEEFF" stroke="#173F6D" stroke-width="3" filter="url(#shadow)"/>
<text x="2025" y="657" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">4  Execution Agent</text>
<text x="1822" y="693" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">采集新 Scene 或执行已校验动作</text>
<text x="1822" y="723" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">action_id 幂等</text>
<rect x="845" y="930" width="710" height="170" rx="18" fill="#E9EDF3" stroke="#667085" stroke-width="3" filter="url(#shadow)"/>
<text x="1200" y="972" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#667085">KG Writer（确定性、唯一写入口）</text>
<text x="867" y="1008" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">perception / planning / human review / execution</text>
<text x="867" y="1039" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">拒绝任意 Cypher；提交后刷新镜像</text>
<rect x="120" y="1000" width="520" height="175" rx="18" fill="#ECE5FF" stroke="#6548A8" stroke-width="3" filter="url(#shadow)" stroke-dasharray="12 9"/>
<text x="380" y="1042" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#6548A8">外部工具 / 服务</text>
<text x="142" y="1078" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">YOLO、VLM、RealSense</text>
<text x="142" y="1109" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">当前通过 runner 注入；真实工具待接</text>
<rect x="1780" y="1000" width="500" height="175" rx="18" fill="#ECE5FF" stroke="#6548A8" stroke-width="3" filter="url(#shadow)" stroke-dasharray="12 9"/>
<text x="2030" y="1042" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#6548A8">ROS2 / MoveIt / PiPER</text>
<text x="1802" y="1078" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">结构化命令，不接收自由文本</text>
<text x="1802" y="1109" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">当前 placeholder / planned</text>
<text x="1200" y="1275" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="23" fill="#5B6577">实线：当前编排与契约已实现    虚线：真实设备/外部服务待接    Agent 节点目前未绑定可见的 LLM runtime</text>
