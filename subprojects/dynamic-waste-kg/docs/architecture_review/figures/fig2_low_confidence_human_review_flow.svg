<rect width="2400" height="1350" fill="#F7F9FC"/>
<text x="90" y="72" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="42" font-weight="700" fill="#172033">② 低置信度与人工复核的信息流</text>
<text x="90" y="112" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="23" fill="#5B6577">YOLO 只给出候选；VLM 只做受约束属性一致性判断；人工决定通过 HumanReviewEvent 进入唯一 KG 写入口</text>
