<text x="675" y="232" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">YOLO segmentation</text>
<text x="522" y="268" font-family="Microsoft YaHei, sans-serif" font-size="23" fill="#172033">11类候选 + confidence</text>
<text x="522" y="301" font-family="Microsoft YaHei, sans-serif" font-size="23" fill="#172033">bbox / mask / crop</text>
<rect x="970" y="175" width="450" height="195" rx="18" fill="#E9EDF3" stroke="#667085" stroke-width="3" filter="url(#shadow)"/>
<text x="1195" y="217" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#667085">置信度与类别策略门控</text>
<text x="992" y="253" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">&lt;0.05：丢弃</text>
<text x="992" y="284" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">0.05–0.30：人工复核</text>
<text x="992" y="315" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">0.30–0.75：VLM复核</text>
<text x="992" y="346" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">≥0.75：仍检查 always 类别</text>
<rect x="690" y="520" width="420" height="220" rx="18" fill="#ECE5FF" stroke="#6548A8" stroke-width="3" filter="url(#shadow)"/>
<text x="900" y="562" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#6548A8">受约束 VLM</text>
<text x="712" y="598" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">颜色 / 透明度 / 光泽</text>
<text x="712" y="629" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">纹理 / 断裂 / 形状</text>
<text x="712" y="660" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">support 或 conflict</text>
<rect x="1270" y="470" width="400" height="180" rx="18" fill="#DDF3E4" stroke="#26734D" stroke-width="3" filter="url(#shadow)"/>
<text x="1470" y="512" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#26734D">Accepted instance</text>
<text x="1292" y="548" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">CONFIRMED_AS</text>
<text x="1292" y="578" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">仍需深度、遮挡与策略校验</text>
<rect x="1270" y="735" width="430" height="200" rx="18" fill="#FFF0D6" stroke="#B86616" stroke-width="3" filter="url(#shadow)"/>
<text x="1485" y="777" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#B86616">Unknown / review_required</text>
<text x="1292" y="813" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">robot_forbidden 或 human_review_required</text>
<text x="1292" y="843" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">RECORDED_AS -&gt; UnknownSample</text>
<rect x="1850" y="545" width="420" height="240" rx="18" fill="#DDF3E4" stroke="#26734D" stroke-width="3" filter="url(#shadow)"/>
<text x="2060" y="587" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#26734D">KG Writer（唯一写入口）</text>
<text x="1872" y="623" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">schema 校验</text>
<text x="1872" y="654" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">短期状态更新</text>
<text x="1872" y="685" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">追加事件</text>
<text x="1872" y="716" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">Neo4j / UI 镜像</text>
<rect x="1790" y="915" width="520" height="235" rx="18" fill="#FFF0D6" stroke="#B86616" stroke-width="3" filter="url(#shadow)"/>
<text x="2050" y="957" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#B86616">人工复核 Human-in-the-loop</text>
<text x="1812" y="993" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">confirm_existing / mark_unknown</text>
<text x="1812" y="1023" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">approve_robot / forbid_robot</text>
<text x="1812" y="1053" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">discard_detection</text>
<rect x="220" y="1060" width="1420" height="150" rx="18" fill="#E9EDF3" stroke="#667085" stroke-width="3" filter="url(#shadow)"/>
<text x="930" y="1102" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#667085">规划放行条件（确定性硬过滤）</text>
<text x="242" y="1138" font-family="Microsoft YaHei, sans-serif" font-size="22" fill="#172033">accepted ∧ auto_allowed ∧ depth_valid_ratio≥0.30 ∧ occlusion=none ∧ task=pending ∧ attempts&lt;2；否则复核、重扫或不执行</text>
</svg>