<text x="142" y="613" font-family="Microsoft YaHei, sans-serif" font-size="23" fill="#172033">scene_id / captured_at</text>
<text x="142" y="646" font-family="Microsoft YaHei, sans-serif" font-size="23" fill="#172033">rgb_ref / depth_ref</text>
<rect x="660" y="500" width="620" height="255" rx="18" fill="#FFFFFF" stroke="#173F6D" stroke-width="3" filter="url(#shadow)"/>
<text x="970" y="542" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#173F6D">ObjectInstance</text>
