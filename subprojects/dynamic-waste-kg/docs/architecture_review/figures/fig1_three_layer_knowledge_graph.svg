<text x="682" y="608" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">证据：bbox / mask / crop</text>
<text x="682" y="638" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">几何：center / depth ratio / extent / occlusion</text>
<text x="682" y="668" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">任务：handling policy / status / attempts</text>
<rect x="1430" y="500" width="410" height="190" rx="18" fill="#FFF0D6" stroke="#B86616" stroke-width="3" filter="url(#shadow)"/>
<text x="1635" y="542" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#B86616">UnknownSample</text>
<text x="1452" y="578" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">crop / mask / YOLO top-k</text>
<text x="1452" y="608" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">VLM attributes / review status</text>
<text x="1452" y="638" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">human label</text>
<rect x="1910" y="535" width="360" height="165" rx="18" fill="#FFF0D6" stroke="#B86616" stroke-width="3" filter="url(#shadow)"/>
<text x="2090" y="577" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#B86616">UnknownCluster</text>
<text x="1932" y="613" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#172033">members / prototype</text>
