<text x="470" y="252" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#26734D">WasteCategory（11类）</text>
<text x="152" y="288" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">主键 category_name</text>
<text x="152" y="319" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">risk / fragility / graspability_prior</text>
<text x="152" y="350" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">VLM policy / handling policy / visual prototype</text>
<rect x="940" y="210" width="610" height="165" rx="18" fill="#FFFFFF" stroke="#26734D" stroke-width="3" filter="url(#shadow)"/>
<text x="1245" y="252" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#26734D">知识种子证据边界</text>
<text x="962" y="288" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">人工定义、待实验验证</text>
<text x="962" y="319" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">单次观测不得直接修改长期先验</text>
<text x="962" y="350" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">演化需审核、训练与独立验证</text>
<rect x="1680" y="210" width="580" height="165" rx="18" fill="#FFFFFF" stroke="#C73E4D" stroke-width="3" filter="url(#shadow)"/>
<text x="1970" y="252" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="31" font-weight="700" fill="#C73E4D">禁止进入 KG 的规划属性</text>
<text x="1702" y="288" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">task_value / priority_tier</text>
<text x="1702" y="319" font-family="Microsoft YaHei, sans-serif" font-size="21" fill="#172033">动态评分、动作顺序、失败策略</text>
