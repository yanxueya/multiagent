<rect x="2025" y="995" width="270" height="115" rx="18" fill="#FFFFFF" stroke="#A33A50" stroke-width="3" filter="url(#shadow)"/>
<text x="2160" y="1037" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#A33A50">KnowledgeEvolutionEvent</text>
<text x="2047" y="1073" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#172033">event_id / time / source</text>
<text x="970" y="825" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" fill="#173F6D">ObjectInstance &lt;-&gt; ObjectInstance：NEAR（无属性关系）</text>
<text x="1200" y="1180" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" fill="#A33A50">事件通过 IN_SCENE / DETECTED / REVIEWS / UPDATES / SELECTS / EXECUTES_ON / CREATES 等关系连接真实业务节点</text>
