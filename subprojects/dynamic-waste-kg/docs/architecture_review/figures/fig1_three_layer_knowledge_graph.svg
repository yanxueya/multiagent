<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="context-stroke"/></marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.12"/></filter>
</defs>
<rect width="2400" height="1350" fill="#F7F9FC"/>
<text x="90" y="72" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="42" font-weight="700" fill="#172033">① 三层动态知识图谱架构</text>
<text x="90" y="112" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="23" fill="#5B6577">层级是语义分层，不在 Neo4j 中创建虚构 Layer 节点；类别由关系表达，不作为实例属性持久化</text>
<rect x="70" y="145" width="2260" height="270" rx="24" fill="#DDF3E4" stroke="#26734D" stroke-width="3"/>
<text x="98" y="187" font-family="Microsoft YaHei, sans-serif" font-size="29" font-weight="700" fill="#26734D">长期知识层  Long-term knowledge</text>
