<text x="1520" y="1037" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#A33A50">PlanningEvent</text>
<text x="1407" y="1073" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#172033">event_id / time / source</text>
<rect x="1705" y="995" width="270" height="115" rx="18" fill="#FFFFFF" stroke="#A33A50" stroke-width="3" filter="url(#shadow)"/>
