<rect x="1793" y="572" width="164" height="32" rx="8" fill="#F7F9FC" opacity="0.94"/>
<text x="1875" y="596" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#B86616">MEMBER_OF</text>
