<rect x="1273" y="577" width="164" height="32" rx="8" fill="#F7F9FC" opacity="0.94"/>
<text x="1355" y="601" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#B86616">RECORDED_AS</text>
