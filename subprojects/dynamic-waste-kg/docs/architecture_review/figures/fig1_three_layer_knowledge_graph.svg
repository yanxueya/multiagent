<text x="98" y="487" font-family="Microsoft YaHei, sans-serif" font-size="29" font-weight="700" fill="#173F6D">短期记忆层  Short-term memory</text>
<rect x="70" y="905" width="2260" height="350" rx="24" fill="#FCE3E8" stroke="#A33A50" stroke-width="3"/>
<text x="98" y="947" font-family="Microsoft YaHei, sans-serif" font-size="29" font-weight="700" fill="#A33A50">事件日志层  Append-only event log</text>
